<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Starters Step — Skills Wizard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  button:hover { filter: brightness(0.95); }
  button:active { transform: scale(0.98); }
  ::selection { background: #EDE9FE; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  a { color: #7C3AED; text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }
  @keyframes starterFadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const c = {
  purple: "#7C3AED", purpleDark: "#5B21B6", purpleLight: "#EDE9FE",
  blue: "#2563EB", blueLight: "#DBEAFE",
  green: "#059669", greenLight: "#D1FAE5",
  orange: "#D97706", orangeLight: "#FEF3C7",
  g900: "#111827", g800: "#1F2937", g700: "#374151", g600: "#4B5563",
  g500: "#6B7280", g400: "#9CA3AF", g300: "#D1D5DB", g200: "#E5E7EB",
  g100: "#F3F4F6", g50: "#F9FAFB", white: "#FFFFFF",
};

const brandColor = "#C41E3A";
const brandBgGradient = "linear-gradient(180deg, #E8384F 0%, #D42E45 60%, #C4253B 100%)";

const Btn = ({ v = "primary", sz = "md", children, style, ...props }) => {
  const base = { border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, fontFamily: "inherit", transition: "all 0.15s", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, whiteSpace: "nowrap" };
  const sizes = { sm: { fontSize: 13, padding: "6px 14px" }, md: { fontSize: 14, padding: "8px 18px" }, lg: { fontSize: 15, padding: "10px 24px" } };
  const variants = {
    primary: { backgroundColor: c.purple, color: c.white },
    ghost: { backgroundColor: "transparent", color: c.g500 },
    success: { backgroundColor: c.green, color: c.white },
  };
  return <button style={{ ...base, ...sizes[sz], ...variants[v], ...style }} {...props}>{children}</button>;
};

const SteppedProgress = ({ current, total, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0" }}>
    <span style={{ fontSize: 13, fontWeight: 500, color: c.g500, whiteSpace: "nowrap" }}>{label}</span>
    <div style={{ flex: 1, display: "flex", gap: 3 }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, backgroundColor: i < current ? c.purple : c.g200, transition: "background 0.3s" }} />
      ))}
    </div>
  </div>
);

const Badge = ({ color = "purple", children }) => {
  const bg = color === "purple" ? c.purpleLight : color === "blue" ? c.blueLight : color === "green" ? c.greenLight : c.g100;
  const fg = color === "purple" ? c.purpleDark : color === "blue" ? c.blue : color === "green" ? c.green : c.g600;
  return <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 10px", borderRadius: 9999, fontSize: 12, fontWeight: 600, backgroundColor: bg, color: fg }}>{children}</span>;
};

const PageShell = ({ children }) => (
  <div style={{ minHeight: "100vh", backgroundColor: "#FAFAFA", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <div style={{ width: 220, backgroundColor: c.white, borderRight: `1px solid ${c.g200}`, padding: "20px 0", flexShrink: 0 }}>
        <div style={{ padding: "0 16px", marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 600, color: c.g800 }}>
            <span style={{ fontSize: 16 }}>⚡</span> AI Agent
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 2, padding: "0 8px" }}>
          {["Overview", "Analyze"].map(item => (
            <div key={item} style={{ padding: "8px 12px", borderRadius: 6, fontSize: 13, color: c.g500, cursor: "pointer" }}>{item}</div>
          ))}
          <div style={{ padding: "4px 12px", fontSize: 12, fontWeight: 500, color: c.g400, marginTop: 8 }}>Train</div>
          <div style={{ padding: "8px 12px", borderRadius: 6, fontSize: 13, fontWeight: 500, color: c.purple, backgroundColor: c.purpleLight, cursor: "pointer" }}>Skills</div>
          {["Knowledge", "Tone of voice", "Actions", "Products", "Shopping Assistant"].map(item => (
            <div key={item} style={{ padding: "8px 12px", borderRadius: 6, fontSize: 13, color: c.g500, cursor: "pointer" }}>{item}</div>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
        {children}
      </div>
    </div>
  </div>
);

const Toggle = ({ enabled, onToggle }) => (
  <div onClick={onToggle} style={{ width: 40, height: 22, borderRadius: 11, backgroundColor: enabled ? c.purple : c.g300, padding: 2, cursor: "pointer", flexShrink: 0, transition: "background 0.2s" }}>
    <div style={{ width: 18, height: 18, borderRadius: 9, backgroundColor: c.white, marginLeft: enabled ? 18 : 0, transition: "margin 0.2s" }} />
  </div>
);

const ACCEPTED_SKILLS = [
  { id: "s1", name: "Returns & Exchanges", type: "personalized_skill", suggestedStarter: "I want to return or exchange an item", replacesFlow: { name: "Return and exchange policy", completion: 51 } },
  { id: "s2", name: "Order Cancellations", type: "personalized_skill", suggestedStarter: "I need to cancel my order", replacesFlow: { name: "Cancel my order", completion: 44 } },
  { id: "s3", name: "Order Status & Tracking", type: "guidance_transfer", suggestedStarter: "Where is my order?", replacesFlow: { name: "Track My Order", completion: 38 } },
  { id: "s4", name: "Subscription Management", type: "new_skill", suggestedStarter: "I need help with my subscription", replacesFlow: null },
  { id: "s5", name: "Shipping Address Changes", type: "personalized_skill", suggestedStarter: "I need to update my shipping address", replacesFlow: { name: "Update my shipping address", completion: 55 } },
];

// ─── Chat Widget Preview (truncated to starters area, looping animation) ───
const ChatWidgetPreview = ({ starters }) => {
  const activeStarters = starters.filter(s => s.enabled);
  const [animKey, setAnimKey] = useState(0);

  // Replay animation every 4 seconds
  React.useEffect(() => {
    const interval = setInterval(() => setAnimKey(k => k + 1), 4000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div style={{ display: "flex", justifyContent: "center", padding: "4px 0" }}>
      <div style={{ width: 300, borderRadius: 16, boxShadow: "0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08)", overflow: "hidden", border: `1px solid ${c.g200}`, backgroundColor: c.white }}>
        <div style={{ background: brandBgGradient, position: "relative", display: "flex", flexDirection: "column" }}>

          {/* Fade-out top edge to suggest continuation */}
          <div style={{ height: 28, background: "linear-gradient(180deg, rgba(196,37,59,1) 0%, rgba(212,46,69,0) 100%)", position: "relative" }}>
            <div style={{ position: "absolute", bottom: 0, left: 14, fontSize: 10, color: "rgba(255,255,255,0.45)", fontWeight: 500 }}>AI-powered support</div>
          </div>

          {/* Starters */}
          <div key={animKey} style={{ padding: "8px 14px 10px", display: "flex", flexDirection: "column", gap: 6 }}>
            {activeStarters.length === 0 && (
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", textAlign: "center", padding: "6px 0" }}>No starters enabled</div>
            )}
            {activeStarters.map((s, i) => (
              <div key={s.id} style={{
                padding: "8px 14px", borderRadius: 18, background: "rgba(255,255,255,0.20)",
                fontSize: 12, fontWeight: 500, color: "#fff", alignSelf: "flex-start",
                animation: `starterFadeUp 0.4s ease-out ${0.15 + i * 0.12}s both`,
              }}>
                {s.suggestedStarter}
              </div>
            ))}
          </div>

          {/* Input bar */}
          <div style={{ padding: "4px 14px 14px" }}>
            <div style={{ display: "flex", alignItems: "center", padding: "9px 14px", borderRadius: 20, background: "rgba(255,255,255,0.20)" }}>
              <span style={{ fontSize: 12, color: "rgba(255,255,255,0.55)", flex: 1 }}>Ask anything</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="rgba(255,255,255,0.45)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>
        </div>

        <div style={{ textAlign: "center", padding: "6px 0 8px", fontSize: 9, color: c.g400 }}>Powered by <span style={{ fontWeight: 600 }}>Gorgias</span></div>
      </div>
    </div>
  );
};

// ─── Main ──────────────────────────────────────────────────────────────────
const ConversationStartersStep = () => {
  const [starters, setStarters] = useState(
    ACCEPTED_SKILLS.map(skill => ({ ...skill, enabled: true }))
  );

  const toggleStarter = (id) => {
    setStarters(prev => prev.map(s => s.id === id ? { ...s, enabled: !s.enabled } : s));
  };

  const enabledCount = starters.filter(s => s.enabled).length;

  return (
    <PageShell>
      {/* Top bar */}
      <div style={{ padding: "10px 32px", borderBottom: `1px solid ${c.g200}`, backgroundColor: c.white, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 14, fontWeight: 600, color: c.g800 }}>Skills setup</span>
          <span style={{ fontSize: 11, fontWeight: 500, color: c.g400, padding: "3px 10px", borderRadius: 20, backgroundColor: c.g100, display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 6, height: 6, borderRadius: 3, backgroundColor: c.orange, display: "inline-block" }} />
            Draft — nothing is live yet
          </span>
        </div>
        <div style={{ flex: 1, maxWidth: 360, margin: "0 20px" }}>
          <SteppedProgress current={7} total={7} label="7 / 7" />
        </div>
        <Btn v="ghost" sz="sm">Save & continue later</Btn>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: "auto", display: "flex", justifyContent: "center", padding: "32px 40px" }}>
        <div style={{ width: "100%", maxWidth: 680 }}>

          {/* Header */}
          <div style={{ marginBottom: 8 }}>
            <h2 style={{ fontSize: 22, fontWeight: 700, color: c.g900, margin: "0 0 6px" }}>Let shoppers reach your skills instantly</h2>
            <p style={{ fontSize: 14, color: c.g500, lineHeight: 1.6, margin: 0 }}>
              Add conversation starters to your chat homepage so shoppers can tap a topic and get help from AI Agent right away — with follow-ups, edge cases, and multi-turn handled automatically.
            </p>
          </div>

          {/* Value nudge banner */}
          <div style={{ padding: "14px 18px", borderRadius: 10, backgroundColor: c.purpleLight, border: `1px solid ${c.purple}25`, marginBottom: 24, display: "flex", gap: 12, alignItems: "flex-start" }}>
            <span style={{ fontSize: 16, flexShrink: 0, marginTop: 1 }}>✨</span>
            <div style={{ fontSize: 13, color: c.purpleDark, lineHeight: 1.6 }}>
              <strong>Why this matters:</strong> Your current Flow starters are static decision trees — on average, only 47% of shoppers who start a Flow make it to the end. Skill-linked starters connect shoppers directly to AI Agent, which adapts to each conversation in real time. You can manage all starters from <a href="#" style={{ color: c.purpleDark, fontWeight: 700, textDecoration: "underline" }}>Deploy → Chat → Conversation Starters</a>.
            </div>
          </div>

          {/* Starters list */}
          <div style={{ backgroundColor: c.white, borderRadius: 14, border: `1px solid ${c.g200}`, overflow: "hidden" }}>
            <div style={{ padding: "14px 20px", borderBottom: `1px solid ${c.g100}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: c.g800 }}>Conversation starters</span>
                <span style={{ fontSize: 12, fontWeight: 500, color: c.purple, backgroundColor: c.purpleLight, padding: "2px 8px", borderRadius: 9999 }}>{enabledCount} enabled</span>
              </div>
              <div style={{ fontSize: 12, color: c.g400 }}>Shown in chat widget</div>
            </div>

            {starters.map((starter, i) => (
              <div key={starter.id} style={{ padding: "16px 20px", borderBottom: i < starters.length - 1 ? `1px solid ${c.g100}` : "none", display: "flex", alignItems: "flex-start", gap: 14, opacity: starter.enabled ? 1 : 0.55, transition: "opacity 0.2s" }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, backgroundColor: starter.enabled ? c.purpleLight : c.g100, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2, transition: "background 0.2s" }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill={starter.enabled ? c.purple : c.g400} opacity="0.9"/>
                  </svg>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, color: c.g800, marginBottom: 4 }}>
                    "{starter.suggestedStarter}"
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: starter.replacesFlow ? 6 : 0 }}>
                    <span style={{ fontSize: 12, color: c.g500 }}>from</span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: c.g700 }}>{starter.name}</span>
                    <Badge color={starter.type === "new_skill" ? "blue" : starter.type === "guidance_transfer" ? "green" : "purple"}>
                      {starter.type === "new_skill" ? "New skill" : starter.type === "guidance_transfer" ? "Transferred" : "Enhanced"}
                    </Badge>
                  </div>
                  {starter.replacesFlow && (
                    <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 4 }}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
                        <path d="M3 6h3a2 2 0 012 2v8a2 2 0 002 2h3" stroke={c.g400} strokeWidth="1.7" strokeLinecap="round"/>
                        <path d="M21 18h-3a2 2 0 01-2-2V8a2 2 0 00-2-2H11" stroke={c.g400} strokeWidth="1.7" strokeLinecap="round"/>
                        <circle cx="3" cy="6" r="2" stroke={c.g400} strokeWidth="1.7"/>
                        <circle cx="21" cy="18" r="2" stroke={c.g400} strokeWidth="1.7"/>
                      </svg>
                      <span style={{ fontSize: 12, color: c.g500, fontWeight: 500 }}>
                        replaces "{starter.replacesFlow.name}" flow
                      </span>
                      <span style={{ fontSize: 11, color: c.g400 }}>·</span>
                      <span style={{ fontSize: 11, fontWeight: 600, color: c.orange }}>
                        {starter.replacesFlow.completion}% completion
                      </span>
                    </div>
                  )}
                </div>
                <div style={{ flexShrink: 0, paddingTop: 6 }}>
                  <Toggle enabled={starter.enabled} onToggle={() => toggleStarter(starter.id)} />
                </div>
              </div>
            ))}
          </div>

          {/* Chat preview — below the list */}
          <div style={{ marginTop: 24, backgroundColor: c.white, borderRadius: 14, border: `1px solid ${c.g200}`, overflow: "hidden" }}>
            <div style={{ padding: "12px 20px", borderBottom: `1px solid ${c.g100}`, display: "flex", alignItems: "center", gap: 6 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke={c.g400} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <span style={{ fontSize: 13, fontWeight: 600, color: c.g800 }}>Preview</span>
              <span style={{ fontSize: 12, color: c.g400 }}>— how shoppers will see it</span>
            </div>
            <div style={{ padding: "20px 0", backgroundColor: c.g50 }}>
              <ChatWidgetPreview starters={starters} />
            </div>
          </div>

          {/* Hint */}
          <div style={{ marginTop: 16, padding: "12px 16px", borderRadius: 8, backgroundColor: c.g50, border: `1px solid ${c.g100}` }}>
            <span style={{ fontSize: 12, color: c.g500 }}>💡 Starters are shown in order. You can reorder, add custom starters, or manage them later from <a href="#" style={{ color: c.purple, fontWeight: 600, fontSize: 12 }}>AI Agent → Deploy → Chat</a>.</span>
          </div>

        </div>
      </div>

      {/* Footer */}
      <div style={{ padding: "14px 32px", borderTop: `1px solid ${c.g200}`, backgroundColor: c.white, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Btn v="ghost" sz="md">← Back</Btn>
        <Btn v="success" sz="lg">Apply all changes</Btn>
      </div>
    </PageShell>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<ConversationStartersStep />);
</script>
</body>
</html>
