// ════════════════════════════════════════════════════════════════
// ICON RAIL (exact copy from gorgias-shell.jsx)
// ════════════════════════════════════════════════════════════════
function RailIcon({ active, children, onClick }) {
  return (
    <div onClick={onClick} style={{
      width: 40, height: 40, borderRadius: 10,
      display: "flex", alignItems: "center", justifyContent: "center",
      cursor: "pointer",
      background: active ? tokens.railActive : "transparent",
      color: active ? tokens.railActiveText : tokens.railInactive,
    }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background = "#E5E3F0"; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background = active ? tokens.railActive : "transparent"; }}>
      {children}
    </div>
  );
}

const defaultRailIcons = [
  { id: "home", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5V21H15v-5h-6v5H3V10.5z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg> },
  { id: "search", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="1.7"/><path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },
  { id: "notifications", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 106 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>, badge: 1 },

  { id: "ai-agent", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill="currentColor" opacity="0.9"/><circle cx="18" cy="6" r="2" fill="currentColor" opacity="0.6"/><circle cx="6" cy="18" r="1.5" fill="currentColor" opacity="0.5"/></svg> },
  { id: "flows", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h3a2 2 0 012 2v8a2 2 0 002 2h3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M21 18h-3a2 2 0 01-2-2V8a2 2 0 00-2-2H11" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><circle cx="3" cy="6" r="2" stroke="currentColor" strokeWidth="1.7"/><circle cx="21" cy="18" r="2" stroke="currentColor" strokeWidth="1.7"/></svg> },

  { id: "customers", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M16 3.13a4 4 0 010 7.75M21 21v-2a4 4 0 00-3-3.87" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg> },

function IconRail({ activeId = "ai-agent" }) {
  return (
    <div style={{
      width: 56, background: tokens.railBg,
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "10px 0", gap: 4,

      <div style={{ width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", borderRadius: 8, marginBottom: 6 }}>

          <div key={item.id} style={{ position: "relative" }}>
            <RailIcon active={activeId === item.id}>{item.icon}</RailIcon>
            {item.badge != null && (
              <div style={{
                position: "absolute", top: 4, right: 4,
                width: 16, height: 16, borderRadius: "50%",

                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 9, fontWeight: 700, color: "#fff",
                border: `2px solid ${tokens.railBg}`, lineHeight: 1,
              }}>{item.badge}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// NAV PANEL (exact copy from gorgias-shell.jsx)
// ════════════════════════════════════════════════════════════════
function NavSection({ label }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "8px 8px 4px", cursor: "pointer",
    }}>
      <span style={{ fontSize: 13, fontWeight: 600, color: tokens.textSecondary, letterSpacing: "0.01em" }}>{label}</span>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M4 10l4-4 4 4" stroke="#9CA3AF" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

function NavSubItem({ label, isActive, badge, count, dot, onClick }) {
  return (
    <div onClick={onClick} style={{
      display: "flex", alignItems: "center",
      padding: "7px 8px 7px 14px",
      borderRadius: 8, cursor: "pointer",
      background: isActive ? tokens.railActive : "transparent",
      gap: 6,
    }}
      onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = "#F3F2F8"; }}
      onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = isActive ? tokens.railActive : "transparent"; }}>
      <span style={{
        fontSize: 14,
        color: isActive ? tokens.railActiveText : tokens.text,
        fontWeight: isActive ? 600 : 400,
        flex: 1,
      }}>{label}</span>
      {badge && (
        <span style={{
          fontSize: 11, fontWeight: 600, padding: "2px 7px",
          borderRadius: 6, background: tokens.purpleLight, color: tokens.railActiveText,
        }}>{badge}</span>
      )}
      {count != null && (
        <span style={{ fontSize: 14, color: tokens.text, fontWeight: 400 }}>{count}</span>
      )}
      {dot && (
        <div style={{ width: 9, height: 9, borderRadius: "50%", background: "#22C55E", flexShrink: 0 }} />
      )}
    </div>
  );
}

function NavTopItem({ label }) {

// SKILL PICKER MODAL
// ════════════════════════════════════════════════════════════════
function SkillPickerModal({ open, onClose, onSelect, existingSkillNames }) {
  const [search, setSearch] = useState("");
  if (!open) return null;

  const filtered = availableSkills.filter(s =>
    s.name.toLowerCase().includes(search.toLowerCase()) &&
    !existingSkillNames.includes(s.name)
  );

  return (
    <>
      <div onClick={onClose} style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 200,
      }} />
      <div style={{
        position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
        width: 440, maxHeight: "70vh", background: tokens.bgWhite, borderRadius: 16,
        boxShadow: "0 24px 48px rgba(0,0,0,0.2)", zIndex: 201,
        display: "flex", flexDirection: "column", overflow: "hidden",
        fontFamily: "Inter, sans-serif",
      }}>
        {/* Header */}
        <div style={{ padding: "20px 24px 0" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: tokens.text }}>Add from Skill</h2>
            <button onClick={onClose} style={{
              width: 28, height: 28, borderRadius: 6, border: `1px solid ${tokens.border}`,
              background: "#fff", cursor: "pointer", display: "flex", alignItems: "center",
              justifyContent: "center", flexShrink: 0,
            }}>
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d="M3 3l10 10M13 3L3 13" stroke="#6B7280" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
          <p style={{ fontSize: 13, color: tokens.textSecondary, margin: "0 0 14px", lineHeight: 1.4 }}>
            Select a Skill to create a conversation starter. The starter will trigger AI Agent with that Skill's context.
          </p>
          <div style={{ position: "relative", marginBottom: 12 }}>
            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: tokens.textMuted }}>⌕</span>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search skills..."
              autoFocus
              style={{
                width: "100%", boxSizing: "border-box",
                paddingLeft: 30, paddingRight: 12, paddingTop: 9, paddingBottom: 9,
                border: `1px solid ${tokens.border}`, borderRadius: 8,
                fontSize: 13, color: tokens.text, background: tokens.bgWhite,
                outline: "none", fontFamily: "inherit",
              }}
            />
          </div>
        </div>

        {/* Skill list */}
        <div style={{ flex: 1, overflowY: "auto", padding: "0 12px 12px" }}>
          {filtered.length === 0 && (
            <div style={{ padding: "24px 12px", textAlign: "center", color: tokens.textMuted, fontSize: 13 }}>
              {search ? "No matching skills found" : "All skills are already added as starters"}
            </div>
          )}
          {filtered.map((skill) => (
            <div key={skill.name}
              onClick={() => { onSelect(skill); }}
              style={{
                padding: "12px 14px", borderRadius: 10, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 12,
                marginBottom: 2,
              }}
              onMouseEnter={e => e.currentTarget.style.background = tokens.bgPage}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <div style={{
                width: 32, height: 32, borderRadius: 8, flexShrink: 0,
                background: tokens.purpleLight,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill={tokens.purple} opacity="0.9"/>
                </svg>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: tokens.text }}>{skill.name}</div>
                <div style={{ fontSize: 12, color: tokens.textMuted, marginTop: 2 }}>"{skill.suggestedStarter}"</div>
              </div>
              {!skill.enabled && (
                <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: tokens.grayLight, color: tokens.textMuted, fontWeight: 500, flexShrink: 0 }}>Disabled</span>
              )}
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                <path d="M6 4l4 4-4 4" stroke={tokens.textMuted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ════════════════════════════════════════════════════════════════
// FLOW MIGRATION NUDGE
// ════════════════════════════════════════════════════════════════
function FlowMigrationNudge({ flowName, onNavigate }) {
  const replacement = flowReplacements[flowName];
  if (!replacement) return null;

  return (
    <div style={{
      margin: "0 12px 4px 38px", padding: "4px 0",
      display: "flex", alignItems: "center", gap: 6,
      fontSize: 11, color: tokens.textMuted, lineHeight: 1.3,
    }}>
      <span style={{ color: "#D97706", fontWeight: 600, flexShrink: 0 }}>{replacement.completionRate}% completion</span>
      <span style={{ color: tokens.border }}>·</span>
      <span>Set up <span onClick={() => onNavigate?.(replacement.navTarget)} style={{ color: tokens.purple, fontWeight: 500, cursor: "pointer", textDecoration: "underline", textDecorationColor: tokens.purpleMid, textUnderlineOffset: 2 }}>{replacement.suggestedLabel}</span> instead</span>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// CONVERSATION STARTERS — Unified card (Skills + Flows only)
// ════════════════════════════════════════════════════════════════

const MAX_STARTERS = 8;

function ConversationStartersCard({ starters, setStarters, enabled, setEnabled, onNavigate }) {
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [flowEditorIdx, setFlowEditorIdx] = useState(null);
  const [skillPopoverIdx, setSkillPopoverIdx] = useState(null);
  const [showSkillPicker, setShowSkillPicker] = useState(false);

  const removeStarter = (i) => setStarters(starters.filter((_, idx) => idx !== i));

  const toggleEditing = (i) => {
    const n = [...starters];
    n[i] = { ...n[i], editing: !n[i].editing };
    setStarters(n);
  };

  // Per-type edit handler
  const handleEdit = (i) => {
    const starter = starters[i];
    if (starter.type === "flow") {
      setFlowEditorIdx(i);
    } else if (starter.type === "skill") {
      // Skills are now renamable — toggle editing for the display text
      toggleEditing(i);
    }
  };

  const updateText = (i, text) => {
    const n = [...starters];
    n[i] = { ...n[i], text };
    setStarters(n);
  };

  // Drag-and-drop handlers
  const handleDragStart = (i) => setDragIdx(i);
  const handleDragOver = (e, i) => { e.preventDefault(); setDragOverIdx(i); };
  const handleDrop = (i) => {
    if (dragIdx === null || dragIdx === i) { setDragIdx(null); setDragOverIdx(null); return; }
    const n = [...starters];
    const [moved] = n.splice(dragIdx, 1);
    n.splice(i, 0, moved);
    setStarters(n);
    setDragIdx(null);
    setDragOverIdx(null);
  };
  const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

  // Add from skill picker
  const handleAddFromSkill = (skill) => {
    const newStarter = {
      text: skill.suggestedStarter,
      type: "skill",
      skillName: skill.name,
      editing: false,
      clicks: null,
    };
    setStarters([...starters, newStarter]);
    setShowSkillPicker(false);
  };

  const existingSkillNames = starters.filter(s => s.type === "skill").map(s => s.skillName);

  const DragDots = () => (
    <svg width="12" height="16" viewBox="0 0 12 16" fill="none" style={{ cursor: "grab", flexShrink: 0 }}>
      <circle cx="3" cy="3" r="1.5" fill="#9CA3AF"/><circle cx="9" cy="3" r="1.5" fill="#9CA3AF"/>
      <circle cx="3" cy="8" r="1.5" fill="#9CA3AF"/><circle cx="9" cy="8" r="1.5" fill="#9CA3AF"/>
      <circle cx="3" cy="13" r="1.5" fill="#9CA3AF"/><circle cx="9" cy="13" r="1.5" fill="#9CA3AF"/>
    </svg>
  );

  // Find max clicks for relative sizing
  const maxClicks = Math.max(...starters.map(s => s.clicks || 0), 1);

  // Tooltip wrapper
  const Tooltip = ({ children, text, width = 220 }) => {
    const [show, setShow] = useState(false);
    return (
      <div style={{ position: "relative", flexShrink: 0, display: "flex", alignItems: "center" }}
        onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
        {children}
        {show && (
          <div style={{
            position: "absolute", bottom: "calc(100% + 8px)", left: 0,
            padding: "7px 10px", borderRadius: 6, background: tokens.text, color: "#fff",
            fontSize: 11, lineHeight: 1.4, width, whiteSpace: "normal",
            boxShadow: "0 4px 12px rgba(0,0,0,0.15)", zIndex: 1000, textAlign: "left",
            pointerEvents: "none",
          }}>
            {text}
            <div style={{
              position: "absolute", bottom: -3, left: 8, transform: "rotate(45deg)",
              width: 6, height: 6, background: tokens.text,
            }} />
          </div>
        )}
      </div>
    );
  };

  // Type badge with tooltip for each row
  const TypeBadge = ({ type, skillName }) => {
    if (type === "skill") {
      return (
        <Tooltip text={`Triggers the "${skillName}" Skill. You can rename the display text — the Skill connection is preserved.`} width={240}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, cursor: "default", color: tokens.purple }}>
            <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill="currentColor" opacity="0.9"/>
          </svg>
        </Tooltip>
      );
    }
    if (type === "flow") return (
      <Tooltip text="Linked to a legacy Flow. Flows can no longer be created — consider replacing with a Skill-linked starter for better AI Agent results." width={260}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, cursor: "default" }}>
          <path d="M3 6h3a2 2 0 012 2v8a2 2 0 002 2h3" stroke={tokens.yellow} strokeWidth="1.7" strokeLinecap="round"/>
          <path d="M21 18h-3a2 2 0 01-2-2V8a2 2 0 00-2-2H11" stroke={tokens.yellow} strokeWidth="1.7" strokeLinecap="round"/>
          <circle cx="3" cy="6" r="2" stroke={tokens.yellow} strokeWidth="1.7"/>
          <circle cx="21" cy="18" r="2" stroke={tokens.yellow} strokeWidth="1.7"/>
        </svg>
      </Tooltip>
    );
    return null;
  };

  // Click stat with mini bar
  const ClickStat = ({ clicks, isTop }) => {
    if (clicks == null) return null;
    const pct = Math.round((clicks / maxClicks) * 100);
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, minWidth: 80 }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: tokens.grayLight, overflow: "hidden", flexShrink: 0 }}>
          <div style={{ height: 4, width: `${pct}%`, borderRadius: 2, background: isTop ? tokens.green : tokens.purpleMid }} />
        </div>
        <span style={{ fontSize: 11, color: isTop ? tokens.green : tokens.textMuted, fontWeight: isTop ? 600 : 400, whiteSpace: "nowrap" }}>
          {clicks >= 1000 ? `${(clicks / 1000).toFixed(1)}k` : clicks}
        </span>
        {isTop && (
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
            <path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5 8 2z" fill={tokens.green}/>
          </svg>
        )}
      </div>
    );
  };

  return (
    <div style={{ background: tokens.bgWhite, borderRadius: 12, border: `1px solid ${tokens.border}`, padding: 24 }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: tokens.text, margin: 0 }}>Conversation starters</h3>
        </div>
        <Toggle enabled={enabled} onToggle={() => setEnabled(!enabled)} />
      </div>
      <p style={{ fontSize: 14, color: tokens.textSecondary, margin: "0 0 16px", lineHeight: 1.5 }}>
        Help shoppers get answers faster. Skill-linked starters trigger the AI Agent automatically.
      </p>

      {/* ── Flows deprecation callout ── */}
      {enabled && starters.some(s => s.type === "flow") && (
        <div style={{
          padding: "12px 16px", background: "#FFF7ED", borderRadius: 10,
          border: "1px solid #FDBA74", marginBottom: 16,
          display: "flex", alignItems: "flex-start", gap: 10,
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ marginTop: 1, flexShrink: 0 }}>
            <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill="#EA580C" opacity="0.8"/>
          </svg>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#9A3412", marginBottom: 3 }}>
              Resolve more with AI Agent
            </div>
            <div style={{ fontSize: 12, color: "#9A3412", lineHeight: 1.5 }}>
              AI Agent handles conversations end-to-end with higher resolution rates than static Flows. We'll progressively help you transition your existing Flows to Skill-linked starters that trigger AI Agent — look for recommendations below. New Flows can no longer be created, but you can still edit existing ones.
            </div>
          </div>
        </div>
      )}

      {enabled && (
        <>
          {starters.map((starter, i) => {
            const isEditing = starter.editing;
            const isDragTarget = dragOverIdx === i && dragIdx !== i;
            return (
              <div key={i}>
                <div
                  draggable={!isEditing}
                  onDragStart={() => handleDragStart(i)}
                  onDragOver={(e) => handleDragOver(e, i)}
                  onDrop={() => handleDrop(i)}
                  onDragEnd={handleDragEnd}
                  style={{ opacity: dragIdx === i ? 0.4 : 1, transition: "opacity 0.15s" }}>
                  <div style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
                    borderBottom: i < starters.length - 1 ? `1px solid ${tokens.grayLight}` : "none",
                    borderTop: isDragTarget ? `2px solid ${tokens.accent}` : "2px solid transparent",
                    position: "relative",
                  }}>
                    <DragDots />
                    {/* Type indicator */}
                    <TypeBadge type={starter.type} skillName={starter.skillName} />
                    {/* Text — editable for skills (renamable) */}
                    {isEditing ? (
                      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                        <input type="text" value={starter.text}
                          onChange={(e) => updateText(i, e.target.value)}
                          placeholder={starter.type === "skill" ? "Rename this starter..." : "e.g. Where is my order?"}
                          maxLength={80}
                          autoFocus
                          style={{
                            flex: 1, padding: "8px 12px", border: `1px solid ${tokens.accent}`,
                            borderRadius: 8, fontSize: 14, color: tokens.text,
                            background: tokens.bgWhite, outline: "none", fontFamily: "inherit",
                          }}
                          onBlur={() => { if (starter.text.trim()) toggleEditing(i); }}
                          onKeyDown={(e) => { if (e.key === "Enter" && starter.text.trim()) toggleEditing(i); }}
                        />
                        {starter.type === "skill" && (
                          <div style={{ fontSize: 11, color: tokens.textMuted, paddingLeft: 2 }}>
                            Linked to: <span style={{ color: tokens.purple, fontWeight: 500 }}>{starter.skillName}</span>
                          </div>
                        )}
                      </div>
                    ) : (
                      <span style={{ flex: 1, fontSize: 14, color: starter.text ? tokens.text : tokens.textMuted, lineHeight: 1.4 }}>
                        {starter.text || "Empty starter"}
                      </span>
                    )}
                    {/* Click stats */}
                    {starter.clicks != null && !isEditing && (
                      <Tooltip text={`${starter.clicks} clicks in the last 30 days`} width={160}>
                        <ClickStat clicks={starter.clicks} isTop={starter.clicks === maxClicks} />
                      </Tooltip>
                    )}
                    {/* Action buttons */}
                    {!isEditing && (
                      <div style={{ display: "flex", alignItems: "center", gap: 2, flexShrink: 0 }}>
                        {/* Rename (pencil) — for skills */}
                        {starter.type === "skill" && (
                          <button onClick={() => handleEdit(i)}
                            title="Rename"
                            style={{
                              width: 30, height: 30, borderRadius: 6, border: "none",
                              background: "transparent", cursor: "pointer",
                              display: "flex", alignItems: "center", justifyContent: "center",
                            }}
                            onMouseEnter={e => e.currentTarget.style.background = tokens.grayLight}
                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke={tokens.purple} strokeWidth="1.5" strokeLinecap="round"/>
                              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke={tokens.purple} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          </button>
                        )}
                        {/* Go to Skill page — for skills */}
                        {starter.type === "skill" && (
                          <button
                            title="Go to Skill"
                            style={{
                              width: 30, height: 30, borderRadius: 6, border: "none",
                              background: "transparent", cursor: "pointer",
                              display: "flex", alignItems: "center", justifyContent: "center",
                            }}
                            onMouseEnter={e => e.currentTarget.style.background = tokens.grayLight}
                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke={tokens.purple} strokeWidth="1.5" strokeLinecap="round"/>
                              <path d="M15 3h6v6M10 14L21 3" stroke={tokens.purple} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          </button>
                        )}
                        {/* Open flow editor — for flows */}
                        {starter.type === "flow" && (
                          <button onClick={() => handleEdit(i)}
                            title="Edit flow"
                            style={{
                              width: 30, height: 30, borderRadius: 6, border: "none",
                              background: "transparent", cursor: "pointer",
                              display: "flex", alignItems: "center", justifyContent: "center",
                            }}
                            onMouseEnter={e => e.currentTarget.style.background = tokens.grayLight}
                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke={tokens.textMuted} strokeWidth="1.5" strokeLinecap="round"/>
                              <path d="M15 3h6v6M10 14L21 3" stroke={tokens.textMuted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          </button>
                        )}
                      </div>
                    )}
                    {/* Remove */}
                    <button onClick={() => removeStarter(i)} style={{
                      width: 30, height: 30, borderRadius: 6, border: "none",
                      background: "transparent", cursor: "pointer", color: tokens.textMuted,
                      fontSize: 18, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                    }}
                      onMouseEnter={e => e.currentTarget.style.background = tokens.grayLight}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>&times;</button>
                  </div>
                </div>
                {/* Flow migration nudge — shown below each flow row */}
                {starter.type === "flow" && (
                  <FlowMigrationNudge flowName={starter.text} onNavigate={onNavigate} />
                )}
              </div>
            );
          })}

          {/* Bottom action — only "Add from Skill" */}
          {starters.length < MAX_STARTERS && (
            <div style={{ marginTop: 14 }}>
              <button onClick={() => setShowSkillPicker(true)}
                style={{
                  padding: "8px 16px", borderRadius: 8, border: `1px solid ${tokens.accent}`,
                  background: tokens.purpleLight, fontSize: 13, fontWeight: 600, color: tokens.purple,
                  cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
                }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5L12 2z" fill={tokens.purple} opacity="0.9"/>
                </svg>
                Add from Skill
              </button>
            </div>
          )}
          <div style={{ marginTop: 8, fontSize: 12, color: tokens.textMuted }}>{starters.length} / {MAX_STARTERS} starters</div>
        </>
      )}

      {/* Skill Picker Modal */}
      <SkillPickerModal
        open={showSkillPicker}
        onClose={() => setShowSkillPicker(false)}
        onSelect={handleAddFromSkill}
        existingSkillNames={existingSkillNames}
      />

      {/* Flow Editor Modal */}
      {flowEditorIdx !== null && (() => {
        const flowName = starters[flowEditorIdx]?.text || "Untitled Flow";
        return (
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: "rgba(0,0,0,0.45)", zIndex: 200,
            display: "flex", alignItems: "center", justifyContent: "center",
          }} onClick={() => setFlowEditorIdx(null)}>
          <div onClick={e => e.stopPropagation()} style={{
            width: "85vw", height: "80vh", maxWidth: 1100,
            background: tokens.bgWhite, borderRadius: 16,
            boxShadow: "0 24px 48px rgba(0,0,0,0.2)",
            display: "flex", flexDirection: "column", overflow: "hidden",
          }}>
            {/* Top bar */}
            <div style={{ borderBottom: `1px solid ${tokens.border}`, background: tokens.bgWhite }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button onClick={() => setFlowEditorIdx(null)} style={{
                    background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 6,
                    fontSize: 14, fontWeight: 600, color: tokens.text,
                  }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke={tokens.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    Flows
                  </button>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  {/* Read-only notice */}
                  <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "5px 10px", borderRadius: 6, background: "#FEF3C7", border: "1px solid #FDE68A", fontSize: 11, fontWeight: 600, color: "#92400E" }}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                      <circle cx="8" cy="8" r="6" stroke="#D97706" strokeWidth="1.3"/>
                      <path d="M8 5v3M8 10v.5" stroke="#D97706" strokeWidth="1.3" strokeLinecap="round"/>
                    </svg>
                    Edit only — try AI Agent for better results
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8, border: `1px solid ${tokens.border}`, fontSize: 13, fontWeight: 500, color: tokens.text, cursor: "pointer", background: tokens.bgWhite }}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2l6.93 4v8L8 18 1.07 14V6L8 2z" stroke={tokens.text} strokeWidth="1.3"/><circle cx="8" cy="8" r="2" fill={tokens.text}/></svg>
                    English - US
                  </div>
                  <button style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 8, border: `1px solid ${tokens.border}`, background: tokens.bgWhite, fontSize: 13, fontWeight: 600, color: tokens.text, cursor: "pointer" }}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-6" stroke={tokens.green} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    Test
                  </button>
                  <button style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${tokens.border}`, background: tokens.bgWhite, fontSize: 13, fontWeight: 500, color: tokens.textMuted, cursor: "default", opacity: 0.5 }}>Discard Changes</button>
                  <button style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${tokens.border}`, background: tokens.bgWhite, fontSize: 13, fontWeight: 500, color: tokens.textMuted, cursor: "default", opacity: 0.5 }}>Publish</button>
                </div>
              </div>
              {/* Flow name + tabs */}
              <div style={{ padding: "0 20px" }}>
                <input value={flowName} readOnly style={{ fontSize: 18, fontWeight: 600, color: tokens.text, border: "none", outline: "none", padding: "4px 0", background: "transparent", width: "100%", fontFamily: "inherit" }} />
                <div style={{ fontSize: 12, color: tokens.textMuted, marginBottom: 10 }}>Flow name will not be visible to customers</div>
                <div style={{ display: "flex", gap: 0, borderBottom: `1px solid ${tokens.border}`, marginBottom: -1 }}>
                  {["Configuration", "Channels"].map((tab, ti) => (
                    <button key={tab} style={{
                      padding: "8px 16px", background: "none", border: "none", cursor: "pointer",
                      fontSize: 13, fontWeight: ti === 0 ? 600 : 400,
                      color: ti === 0 ? tokens.text : tokens.textSecondary,
                      borderBottom: ti === 0 ? `2px solid ${tokens.text}` : "2px solid transparent", marginBottom: -1,
                    }}>{tab}</button>
                  ))}
                </div>
              </div>
            </div>

            {/* Canvas area */}
            <div style={{ flex: 1, background: tokens.bgPage, position: "relative", overflow: "hidden" }}>
              {/* Editor/Analysis toggle */}
              <div style={{ position: "absolute", top: 16, right: 20, display: "flex", borderRadius: 8, border: `1px solid ${tokens.border}`, overflow: "hidden", zIndex: 5 }}>
                {["Editor", "Analysis"].map((t, ti) => (
                  <button key={t} style={{
                    padding: "6px 16px", border: "none", fontSize: 13, fontWeight: ti === 0 ? 600 : 400, cursor: "pointer",
                    background: ti === 0 ? tokens.bgWhite : "transparent",
                    color: ti === 0 ? tokens.text : tokens.textSecondary,
                  }}>{t}</button>
                ))}
              </div>

              {/* Zoom controls */}
              <div style={{ position: "absolute", top: 16, left: 20, display: "flex", flexDirection: "column", gap: 4, zIndex: 5 }}>
                {["+", "\u2212", "\u2922"].map((sym, si) => (
                  <div key={si} style={{
                    width: 32, height: 32, borderRadius: 6, border: `1px solid ${tokens.border}`, background: tokens.bgWhite,
                    display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
                    fontSize: 16, color: tokens.textSecondary, fontWeight: 300,
                  }}>{sym}</div>
                ))}
              </div>

              {/* Minimap */}
              <div style={{ position: "absolute", bottom: 16, left: 20, width: 140, height: 90, borderRadius: 8, border: `1px solid ${tokens.border}`, background: tokens.bgWhite, padding: 8, zIndex: 5 }}>
                <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
                  {[1, 2, 3].map(i => <div key={i} style={{ width: 40, height: 6, borderRadius: 2, background: tokens.grayLight }} />)}
                </div>
              </div>

              {/* Flow nodes — centered vertical chain */}
              <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", display: "flex", flexDirection: "column", alignItems: "center" }}>
                {/* START node */}
                <div style={{
                  padding: "16px 40px", borderRadius: 10, border: `1px solid ${tokens.border}`, background: tokens.bgWhite,
                  boxShadow: "0 1px 4px rgba(0,0,0,0.06)", textAlign: "center", minWidth: 220,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: tokens.textSecondary, letterSpacing: "0.05em", marginBottom: 4 }}>START</div>
                  <div style={{ fontSize: 15, fontWeight: 600, color: tokens.text }}>{flowName}</div>
                </div>

                {/* Connector */}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                  <div style={{ width: 1, height: 24, background: tokens.border }} />
                  <div style={{ width: 20, height: 20, borderRadius: 10, border: `1px solid ${tokens.border}`, background: tokens.bgWhite, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: tokens.textMuted, cursor: "pointer" }}>+</div>
                  <div style={{ width: 1, height: 24, background: tokens.border }} />
                </div>

                {/* Automated answer node */}
                <div style={{
                  padding: "14px 20px", borderRadius: 10, border: `1px solid ${tokens.border}`, background: tokens.bgWhite,
                  boxShadow: "0 1px 4px rgba(0,0,0,0.06)", minWidth: 220, position: "relative",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                    <div style={{ width: 14, height: 14, borderRadius: 3, background: tokens.accent }} />
                    <span style={{ fontSize: 12, fontWeight: 600, color: tokens.accent }}>Automated answer</span>
                    <div style={{ marginLeft: "auto", width: 20, height: 20, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: tokens.textMuted }}>
                      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1m2 0v9a1 1 0 01-1 1H4a1 1 0 01-1-1V4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
                    </div>
                  </div>
                  <div style={{ fontSize: 13, color: tokens.text, lineHeight: 1.45 }}>Hi! Our Customer Care Team is offline for the Thanksgiving holiday...</div>
                </div>

                {/* Connector */}
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>

// SETTINGS PAGE CONTENT (Chat settings under Deploy > Chat)
// ════════════════════════════════════════════════════════════════
function SettingsContent({ starters, setStarters, startersEnabled, setStartersEnabled, onNavigate }) {
  const [activeTab, setActiveTab] = useState("automation");
  const tabs = [
    { id: "appearance", label: "Appearance" },
    { id: "preferences", label: "Preferences" },
    { id: "automation", label: "Automation" },
    { id: "language", label: "Language" },
    { id: "installation", label: "Installation" },
  ];

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      {/* Breadcrumb */}
      <div style={{ padding: "12px 24px 0", fontSize: 13, color: tokens.textSecondary }}>
        <span style={{ cursor: "pointer" }}>All chats</span>
        <span style={{ margin: "0 6px", color: tokens.textMuted }}>&rsaquo;</span>
        <span>Sol de Janeiro Support</span>
      </div>

      {/* Page header */}
      <div style={{ padding: "12px 24px 0", display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 32, height: 32, borderRadius: 8, border: `1px solid ${tokens.border}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", background: tokens.bgWhite }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke={tokens.text} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <h1 style={{ fontSize: 20, fontWeight: 700, color: tokens.text, margin: 0 }}>Settings</h1>
      </div>

      {/* Tab bar */}
      <div style={{ padding: "0 24px", borderBottom: `1px solid ${tokens.border}`, display: "flex", gap: 0, marginTop: 16 }}>
        {tabs.map((tab) => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
            padding: "12px 16px", background: "none", border: "none", cursor: "pointer",
            fontSize: 13,
            fontWeight: activeTab === tab.id ? 600 : 400,
            color: activeTab === tab.id ? tokens.accent : tokens.textSecondary,
            borderBottom: activeTab === tab.id ? `2px solid ${tokens.accent}` : "2px solid transparent",
            marginBottom: -1,
            transition: "color 0.1s",
          }}>{tab.label}</button>
        ))}
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {activeTab === "automation" ? (
          <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 20, maxWidth: 680 }}>
            <ConversationStartersCard starters={starters} setStarters={setStarters} enabled={startersEnabled} setEnabled={setStartersEnabled} onNavigate={onNavigate} />
            <OrderManagementCard />
          </div>
        ) : (
          <div style={{ padding: "60px 24px", textAlign: "center", color: tokens.textMuted, fontSize: 14 }}>
            {tabs.find(t => t.id === activeTab)?.label} settings would appear here
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// MAIN APP — with page-level navigation
// ════════════════════════════════════════════════════════════════
function ConversationStartersSkillsPrototype() {
  const [starters, setStarters] = useState([
    { text: "Where is my order?", type: "skill", skillName: "Order status, tracking or delivery timing", editing: false, clicks: 2847 },
    { text: "I want to return or exchange an item", type: "skill", skillName: "Return, exchange or refund status", editing: false, clicks: 1523 },
    { text: "I need to cancel my order", type: "skill", skillName: "Order cancellation", editing: false, clicks: 891 },
    { text: "I received a damaged item", type: "skill", skillName: "Damaged, defective or broken item", editing: false, clicks: 412 },
    { text: "Tennis Racket Finder", type: "flow", editing: false, clicks: 482 },
    { text: "I need to manage my subscription", type: "flow", editing: false, clicks: 203 },
  ]);
  const [startersEnabled, setStartersEnabled] = useState(true);
  // Page navigation: "chat-settings" | "support-actions" | "shopping-assistant"
  const [activePage, setActivePage] = useState("chat-settings");

  // Build nav config dynamically based on active page
  const getNavConfig = () => {
    const base = {
      title: "AI Agent",
      storeName: "one-bone",
      sections: [
        {
          label: "Analyze",
          items: [
            { label: "Overview" },
            { label: "Intents" },
            { label: "Opportunities", badge: "Beta", count: 30 },
          ],
        },
        {
          label: "Train",
          items: [
            { label: "Knowledge" },
            { label: "Support Actions", isActive: activePage === "support-actions" },
            { label: "Products" },
            { label: "Shopping Assistant", isActive: activePage === "shopping-assistant" },
          ],
        },
        { topItem: "Test" },
        {
          label: "Deploy",
          items: [
            { label: "Chat", isActive: activePage === "chat-settings", dot: true },
            { label: "Email", dot: true },
            { label: "SMS", dot: true },
          ],
        },
        { topItem: "Settings" },
      ],
    };
    return base;
  };

  const handleNavigate = (target) => {
    if (target === "Support Actions") setActivePage("support-actions");
    else if (target === "Shopping Assistant") setActivePage("shopping-assistant");
  };

  const handleNavItemClick = (label) => {
    if (label === "Support Actions") setActivePage("support-actions");
    else if (label === "Shopping Assistant") setActivePage("shopping-assistant");
    else if (label === "Chat") setActivePage("chat-settings");
  };

  // Render content based on active page
  const renderContent = () => {
    if (activePage === "support-actions") {
      return <SupportActionsPage onBack={() => setActivePage("chat-settings")} />;
    }
    if (activePage === "shopping-assistant") {
      return <ShoppingAssistantPage onBack={() => setActivePage("chat-settings")} />;
    }
    return (
      <>
        <SettingsContent
          starters={starters}
          setStarters={setStarters}
          startersEnabled={startersEnabled}
          setStartersEnabled={setStartersEnabled}
          onNavigate={handleNavigate}
        />
        <ChatPreview
          starters={starters}
          enabled={startersEnabled}
        />
      </>
    );
  };

  return (
    <>
      <style>{`
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input:focus { outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
      `}</style>
      <div style={css.page}>
        <div style={{ display: "flex", flexShrink: 0, height: "100%" }}>
          <IconRail activeId="ai-agent" />
          <NavPanel config={getNavConfig()} onItemClick={handleNavItemClick} />
        </div>
        <div style={{ ...css.contentContainer, flexDirection: "row" }}>
          {renderContent()}
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ConversationStartersSkillsPrototype));
  </script>
</body>
</html>
